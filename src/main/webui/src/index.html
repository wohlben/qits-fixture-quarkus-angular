<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Quarkus + Angular fixture</title>
  <base href="/">
  <script>
    // Under the qits daemon web view the app is served at /daemon/{workspace}/{daemonId}/
    // (ng serve --serve-path "$QITS_PUBLIC_BASE"). The dev server has no --base-href, so rebase
    // at runtime: with the prefix in <base href>, the Angular router and the base-relative
    // api/greetings fetch (greeting.ts) both stay inside the prefix.
    (function () {
      var match = location.pathname.match(/^\/daemon\/[^/]+\/[^/]+\//);
      if (match) document.querySelector('base').setAttribute('href', match[0]);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>

# REST endpoints live under /api (this resource declares /greetings -> POST /api/greetings).
quarkus.rest.path=/api

# Quinoa auto-detects the Angular app in src/main/webui (angular.json) and the package manager
# (pnpm, from pnpm-lock.yaml), builds it, and serves it at the root.
#  - enable-spa-routing: deep links like /greeting/world fall back to index.html on a hard reload.
#  - ignored-path-prefixes: keep /api out of the SPA fallback so REST calls reach Quarkus.
#  - dev-server.port: in dev mode Quinoa runs `ng serve` here and proxies the UI, so the browser
#    talks to a single origin (the Quarkus port) and the app's relative /api/greetings calls work
#    without CORS or a separate proxy config.
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ignored-path-prefixes=/api
quarkus.quinoa.dev-server.port=4200

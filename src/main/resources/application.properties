# REST endpoints live under /api (this resource declares /greetings -> POST /api/greetings).
quarkus.rest.path=/api

# Quinoa auto-detects the Angular app in src/main/webui (angular.json) and the package manager
# (pnpm, from pnpm-lock.yaml), builds it, and serves it at the root.
#  - enable-spa-routing: deep links like /greeting/world fall back to index.html on a hard reload.
#  - ignored-path-prefixes: keep /api out of the SPA fallback so REST calls reach Quarkus.
#  - dev-server.port: in dev mode Quinoa runs `ng serve` here and proxies the UI, so the browser
#    talks to a single origin (the Quarkus port) and the app's relative /api/greetings calls work
#    without CORS or a separate proxy config.
quarkus.quinoa.enable-spa-routing=true
# Root-path-aware: Quinoa compares ignored prefixes against the full request path, so a bare /api
# stops matching when the app serves under a prefix (quarkus.http.root-path=$QITS_PUBLIC_BASE from
# a qits daemon). Unmatched API GETs would then ping-pong forever between Quinoa's dev proxy and
# ng's API proxy — surfaced by the SPA's GET api/config.json (POSTs never hit it: Quinoa only
# handles GET/HEAD).
quarkus.quinoa.ignored-path-prefixes=${quarkus.http.root-path:/}api
quarkus.quinoa.dev-server.port=4200

# OpenTelemetry: export traces + logs + metrics. The OTLP endpoint, service name and
# qits.* resource attributes are injected by qits at daemon launch (OTEL_EXPORTER_OTLP_* env),
# so only the protocol is pinned here (the qits receiver is protobuf-only).
quarkus.otel.logs.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.exporter.otlp.protocol=http/protobuf
# Don't trace the OTLP passthrough itself: every browser export batch would otherwise mint a
# server span ("POST /otel/v1/…"), dripping self-referential noise into the trace feed. The
# suppress list matches full request paths (trailing * = prefix), hence the root-path expansion.
quarkus.otel.traces.suppress-application-uris=${quarkus.http.root-path:/}api/otel/v1/*
# Tests never have a collector; without this the SDK retries localhost:4317 all run long.
%test.quarkus.otel.sdk.disabled=true

# Write a rolling dev log at the worktree root so a qits daemon FILE LogSource can tail it.
quarkus.log.file.enable=true
quarkus.log.file.path=quarkus.log
